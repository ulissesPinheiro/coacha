name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/coacha

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Testes
  # ─────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes
        run: ./mvnw test --no-transfer-progress

  # ─────────────────────────────────────────
  # JOB 2: Build e Push da imagem
  # (só na branch main, depois dos testes)
  # ─────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # necessário para publicar no GHCR

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # token automático do Actions

      - name: Extrair metadados (tag = SHA curto)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short   # ex: a1b2c3d
            type=raw,value=latest

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────
  # JOB 3: Atualiza o repo GitOps
  # ArgoCD detecta e aplica automaticamente
  # ─────────────────────────────────────────
  update-gitops:
    name: 🔄 Update GitOps repo
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout coacha-gitops
        uses: actions/checkout@v4
        with:
          repository: ulissesPinheiro/coacha-gitops
          token: ${{ secrets.GITOPS_TOKEN }}  # PAT com acesso ao coacha-gitops

      - name: Atualizar tag da imagem no deployment.yaml
        run: |
          NEW_TAG=${{ needs.build-push.outputs.image-tag }}
          echo "Atualizando imagem para tag: $NEW_TAG"
          sed -i "s|ghcr.io/ulissespinheiro/coacha:.*|ghcr.io/ulissespinheiro/coacha:${NEW_TAG}|" k8s/deployment.yaml
          cat k8s/deployment.yaml | grep image:

      - name: Commit e push no gitops repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "chore: update coacha image to ${{ needs.build-push.outputs.image-tag }}

          Triggered by: ${{ github.repository }}@${{ github.sha }}"
          git push
